services:
  db:
    image: pgvector/pgvector:pg16
    container_name: support-rag-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: support_rag
    ports:
      - "5432:5432"
    volumes:
      - support_rag_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: support-rag-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  support_rag_pgdata: